services:
  covfee:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        COVFEE_GIT_URL: ${COVFEE_GIT_URL:-https://github.com/josedvq/covfee.git}
        COVFEE_HOST: ${COVFEE_HOST:-localhost}
        COVFEE_PORT: ${COVFEE_PORT:-5022}
        COVFEE_COVFEE_SECRET_KEY: ${COVFEE_COVFEE_SECRET_KEY:-change-me}
        COVFEE_ADMIN_USERNAME: ${COVFEE_ADMIN_USERNAME:-admin}
        COVFEE_ADMIN_PASSWORD: ${COVFEE_ADMIN_PASSWORD:-change-me}
        COVFEE_MEDIA_SERVER: ${COVFEE_MEDIA_SERVER:-true}
        COVFEE_PROJECT_WWW_URL: ${COVFEE_PROJECT_WWW_URL:-http://localhost:8022}
        COVFEE_REDUX_STORE_HOST: ${COVFEE_REDUX_STORE_HOST:-store}
        COVFEE_REDUX_STORE_PORT: ${COVFEE_REDUX_STORE_PORT:-5555}
        COVFEE_DATABASE_PATH: ${COVFEE_DATABASE_PATH:-/var/lib/covfee/database.covfee.db}
    working_dir: /opt/covfee-project
    env_file:
      - .env
    command: covfee start . --deploy --host "${COVFEE_BIND_HOST:-0.0.0.0}" --port "${COVFEE_BIND_PORT:-5000}"
    depends_on:
      - store
    ports:
      - "${COVFEE_PORT:-5022}:${COVFEE_BIND_PORT:-5000}"
    restart: unless-stopped

  store:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        COVFEE_GIT_URL: ${COVFEE_GIT_URL:-https://github.com/josedvq/covfee.git}
        COVFEE_HOST: ${COVFEE_HOST:-localhost}
        COVFEE_PORT: ${COVFEE_PORT:-5022}
        COVFEE_COVFEE_SECRET_KEY: ${COVFEE_COVFEE_SECRET_KEY:-change-me}
        COVFEE_ADMIN_USERNAME: ${COVFEE_ADMIN_USERNAME:-admin}
        COVFEE_ADMIN_PASSWORD: ${COVFEE_ADMIN_PASSWORD:-change-me}
        COVFEE_MEDIA_SERVER: ${COVFEE_MEDIA_SERVER:-true}
        COVFEE_PROJECT_WWW_URL: ${COVFEE_PROJECT_WWW_URL:-http://localhost:8022}
        COVFEE_REDUX_STORE_HOST: ${COVFEE_REDUX_STORE_HOST:-store}
        COVFEE_REDUX_STORE_PORT: ${COVFEE_REDUX_STORE_PORT:-5555}
        COVFEE_DATABASE_PATH: ${COVFEE_DATABASE_PATH:-/var/lib/covfee/database.covfee.db}
    working_dir: /opt/covfee/store
    env_file:
      - .env
    command: npx ts-node reduxStore.ts "${COVFEE_REDUX_STORE_PORT:-5555}"
    restart: unless-stopped

  www:
    image: nginx:1.27-alpine
    ports:
      - "${COVFEE_WWW_PORT:-8022}:80"
    restart: unless-stopped
    volumes:
      - ../www:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
